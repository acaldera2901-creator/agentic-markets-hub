<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agentic Markets — Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #07090d; --line: #1a2233; --line-2: #243049;
    --text: #e6edf7; --muted: #7d8aa3; --dim: #4a5774;
    --cyan: #00e5ff; --green: #32e0a0; --amber: #ffb547;
    --violet: #9b8cff; --magenta: #ff5cf2;
  }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased;
    overflow: hidden; display: flex; flex-direction: column;
  }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse at 50% 0%, black 30%, transparent 70%);
  }
  .topbar {
    position: relative; z-index: 10; flex-shrink: 0;
    display: flex; align-items: center;
    height: 52px;
    background: rgba(7,9,13,.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    padding: 0 20px; gap: 0;
  }
  .brand {
    display: flex; align-items: center; gap: 8px;
    font-weight: 700; font-size: 13px; color: var(--text);
    margin-right: 28px; flex-shrink: 0;
  }
  .brand-dot { width:9px; height:9px; border-radius:50%; background:var(--cyan); box-shadow:0 0 12px var(--cyan); }
  .brand small { color:var(--muted); font-weight:400; font-size:11px; }
  .tabs { display: flex; gap: 2px; flex: 1; }
  .tab {
    display: flex; align-items: center; gap: 8px;
    padding: 0 18px; height: 52px;
    font-size: 12px; font-weight: 500; color: var(--muted);
    cursor: pointer; border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s, background .15s;
    white-space: nowrap; user-select: none; margin-bottom: -1px;
  }
  .tab:hover { color: var(--text); background: rgba(255,255,255,.03); }
  .tab.active { color: var(--text); border-bottom-color: var(--cyan); }
  .tab .tab-ico {
    width:20px; height:20px; border-radius:5px;
    display:grid; place-items:center; font-size:11px; flex-shrink:0;
  }
  .tab:nth-child(1) .tab-ico { background:rgba(0,229,255,.08);   border:1px solid rgba(0,229,255,.2); }
  .tab:nth-child(2) .tab-ico { background:rgba(155,140,255,.08); border:1px solid rgba(155,140,255,.2); }
  .tab:nth-child(3) .tab-ico { background:rgba(50,224,160,.08);  border:1px solid rgba(50,224,160,.2); }
  .tab .badge {
    font-family:'JetBrains Mono',monospace; font-size:9px; padding:2px 6px; border-radius:4px;
    background:rgba(0,229,255,.08); color:var(--cyan); border:1px solid rgba(0,229,255,.2);
  }
  .tab:nth-child(2) .badge { background:rgba(155,140,255,.08); color:var(--violet); border-color:rgba(155,140,255,.2); }
  .tab:nth-child(3) .badge { background:rgba(50,224,160,.08);  color:var(--green);  border-color:rgba(50,224,160,.2); }
  .status {
    margin-left: auto; display:flex; align-items:center; gap:6px;
    font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); flex-shrink:0;
  }
  .status .dot {
    width:6px; height:6px; border-radius:50%;
    background:var(--green); box-shadow:0 0 6px var(--green);
    animation:blip 1.4s ease-in-out infinite;
  }
  @keyframes blip { 50%{opacity:.3;} }
  .frame-wrap { flex:1; position:relative; z-index:1; overflow:hidden; }
  iframe {
    position:absolute; inset:0; width:100%; height:100%;
    border:none; opacity:0; transition:opacity .2s ease; pointer-events:none;
  }
  iframe.visible { opacity:1; pointer-events:all; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="brand-dot"></span>
    Agentic&nbsp;Markets <small>&nbsp;/&nbsp;Hub</small>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="show(0)">
      <span class="tab-ico">⬡</span>
      Agent Schemas
      <span class="badge">Football · Tennis · Meme</span>
    </div>
    <div class="tab" onclick="show(1)">
      <span class="tab-ico">⬢</span>
      Cross-Desk
      <span class="badge">connections</span>
    </div>
    <div class="tab" onclick="show(2)">
      <span class="tab-ico">🔒</span>
      Confidential
      <span class="badge">private</span>
    </div>
  </div>
  <div class="status">
    <span class="dot"></span>
    <span id="clock">—</span>
  </div>
</div>

<div class="frame-wrap">
  <iframe id="f0" src="unified-schema.html" class="visible"></iframe>
  <iframe id="f1" src="cross-desk.html"              class=""></iframe>
  <iframe id="f2" src="prediction-confidential.html" class=""></iframe>
</div>

<!-- Password Modal -->
<div id="pw-overlay" onclick="if(event.target===this)closePwModal()" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(7,9,13,.9);backdrop-filter:blur(12px);align-items:center;justify-content:center;">
  <div style="background:#0e131c;border:1px solid #243049;border-radius:16px;padding:32px 28px;width:300px;text-align:center;box-shadow:0 0 60px rgba(0,0,0,.7);">
    <div style="font-size:24px;margin-bottom:10px;">🔒</div>
    <div style="font-size:13px;font-weight:700;color:#e6edf7;margin-bottom:4px;">Area Riservata</div>
    <div style="font-size:10px;color:#7d8aa3;margin-bottom:20px;font-family:'JetBrains Mono',monospace;letter-spacing:.05em;">Inserisci la password per accedere</div>
    <input id="pw-input" type="password" autocomplete="off"
      style="width:100%;padding:10px 14px;background:#07090d;border:1px solid #243049;border-radius:8px;color:#e6edf7;font-size:16px;font-family:'JetBrains Mono',monospace;outline:none;text-align:center;letter-spacing:.4em;"
      placeholder="· · · · ·"
      onkeydown="if(event.key==='Enter')submitPw();if(event.key==='Escape')closePwModal();" />
    <div id="pw-err" style="color:#ff5d6c;font-size:10px;font-family:'JetBrains Mono',monospace;margin-top:8px;height:14px;transition:opacity .2s;"></div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button onclick="closePwModal()" style="flex:1;padding:9px;border-radius:8px;border:1px solid #243049;background:transparent;color:#7d8aa3;font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .15s;" onmouseover="this.style.color='#e6edf7'" onmouseout="this.style.color='#7d8aa3'">Annulla</button>
      <button onclick="submitPw()" style="flex:2;padding:9px;border-radius:8px;border:1px solid rgba(0,229,255,.4);background:rgba(0,229,255,.08);color:#00e5ff;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .15s;" onmouseover="this.style.background='rgba(0,229,255,.16)'" onmouseout="this.style.background='rgba(0,229,255,.08)'">Accedi →</button>
    </div>
  </div>
</div>

<script>
  let cur = 0;
  let _pwCb = null;
  const PW = '2901';
  const tabs   = document.querySelectorAll('.tab');
  const frames = document.querySelectorAll('iframe');

  function requirePassword(cb) {
    _pwCb = cb;
    document.getElementById('pw-overlay').style.display = 'flex';
    setTimeout(() => document.getElementById('pw-input').focus(), 60);
  }

  function submitPw() {
    const val = document.getElementById('pw-input').value;
    if (val === PW) {
      closePwModal();
      if (_pwCb) { _pwCb(); _pwCb = null; }
    } else {
      const err = document.getElementById('pw-err');
      err.textContent = '✗ Password errata';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
      setTimeout(() => { err.textContent = ''; }, 2200);
    }
  }

  function closePwModal() {
    document.getElementById('pw-overlay').style.display = 'none';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-err').textContent = '';
    _pwCb = null;
  }

  function show(i) {
    if (i === cur) return;
    if (i === 2) { requirePassword(() => _doShow(2)); return; }
    _doShow(i);
  }

  function _doShow(i) {
    // leaving Confidential → hide iframe content immediately
    if (cur === 2) frames[2].classList.remove('visible');
    tabs[cur].classList.remove('active');
    frames[cur].classList.remove('visible');
    cur = i;
    tabs[cur].classList.add('active');
    frames[cur].classList.add('visible');
  }

  function tick() {
    document.getElementById('clock').textContent = new Date().toISOString().slice(11,19)+' UTC';
  }
  tick(); setInterval(tick, 1000);
</script>
</body>
</html>
