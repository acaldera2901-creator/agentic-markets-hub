<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Agentic Markets — Unified Schema</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#07090d; --bg-2:#0b0e14; --panel:#0e131c; --panel-2:#121826;
    --line:#1a2233; --line-2:#243049; --text:#e6edf7; --muted:#7d8aa3; --dim:#4a5774;
    --cyan:#00e5ff; --cyan-2:#7df9ff; --amber:#ffb547; --green:#32e0a0;
    --magenta:#ff5cf2; --violet:#9b8cff; --red:#ff5d6c;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  body {
    min-height:100vh;
    background:
      radial-gradient(1200px 600px at 50% -8%, rgba(0,229,255,.05), transparent 60%),
      radial-gradient(900px 500px at 0% 110%, rgba(155,140,255,.04), transparent 60%),
      var(--bg);
  }
  body::before {
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size:56px 56px;
    mask-image: radial-gradient(ellipse at 50% 30%, black 40%, transparent 80%);
  }

  /* ── TOPBAR ── */
  .topbar {
    position:sticky; top:0; z-index:30;
    display:flex; align-items:center; gap:10px; padding:8px 16px;
    background:rgba(7,9,13,.88); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .brand { display:flex; align-items:center; gap:8px; font-weight:700; font-size:13px; flex-shrink:0; }
  .brand-dot { width:9px; height:9px; border-radius:50%; background:var(--cyan); box-shadow:0 0 12px var(--cyan); }
  .brand small { color:var(--muted); font-weight:500; font-size:11px; margin-left:4px; }
  .pill {
    display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px;
    background:var(--panel-2); border:1px solid var(--line);
    font-size:10px; color:var(--muted); font-family:'JetBrains Mono',monospace; flex-shrink:0;
  }
  .pill .dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:blip 1.4s ease-in-out infinite; }
  @keyframes blip { 50%{opacity:.35;} }

  /* ── CANVAS ── */
  .canvas-wrap { position:relative; z-index:1; padding:16px 16px 40px; overflow:auto; }
  .canvas {
    position:relative; border:1px solid var(--line); border-radius:14px;
    background:linear-gradient(180deg, rgba(11,14,20,.9), rgba(8,10,16,.95));
    overflow:visible;
  }
  .canvas .grid-bg {
    position:absolute; inset:0; pointer-events:none; border-radius:14px;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size:40px 40px;
  }
  svg.edges { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:2; }

  /* ── DESK ZONE ── */
  .desk-zone {
    position:absolute; border-radius:10px; border:1px solid; pointer-events:none; z-index:1;
    transition:all .2s;
  }
  .desk-label {
    position:absolute; z-index:5; display:flex; align-items:center; gap:8px;
    font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; letter-spacing:.2em; text-transform:uppercase;
  }
  .dl-ico {
    width:24px; height:24px; border-radius:6px; display:grid; place-items:center;
    font-size:13px; border:1px solid;
  }
  .desk-alloc {
    position:absolute; z-index:5;
    font-family:'JetBrains Mono',monospace; font-size:8px; font-weight:700;
    padding:2px 8px; border-radius:6px; border:1px solid;
  }

  /* ── CAPITAL ALLOCATOR ── */
  .capital-allocator {
    position:absolute; z-index:7;
    background:linear-gradient(135deg, rgba(14,22,40,.98), rgba(9,14,26,.98));
    border:1px solid rgba(0,229,255,.35); border-radius:16px;
    padding:14px 20px 16px;
    box-shadow:
      0 0 0 1px rgba(0,229,255,.12),
      0 0 50px rgba(0,229,255,.14),
      0 20px 50px rgba(0,0,0,.6);
  }
  .ca-head { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
  .ca-ico {
    width:36px; height:36px; border-radius:10px; display:grid; place-items:center;
    font-size:20px; background:rgba(0,229,255,.1); border:1px solid rgba(0,229,255,.3); flex-shrink:0;
  }
  .ca-tag { font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:.2em; color:rgba(0,229,255,.6); text-transform:uppercase; }
  .ca-title { font-size:15px; font-weight:700; color:var(--text); letter-spacing:-.01em; }
  .ca-desc { font-size:9px; color:var(--muted); font-family:'JetBrains Mono',monospace; line-height:1.5; margin-bottom:12px; }
  .ca-allocs { display:flex; gap:8px; flex-wrap:wrap; }
  .ca-alloc {
    display:inline-flex; align-items:center; gap:5px;
    padding:3px 10px; border-radius:8px; border:1px solid;
    font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:700;
  }
  .ca-alloc.football { background:rgba(0,229,255,.08); border-color:rgba(0,229,255,.28); color:var(--cyan); }
  .ca-alloc.meme     { background:rgba(255,92,242,.08); border-color:rgba(255,92,242,.28); color:var(--magenta); }
  .ca-alloc.tennis   { background:rgba(255,181,71,.08); border-color:rgba(255,181,71,.28); color:var(--amber); }
  .ca-pulse { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .live   { background:var(--green); box-shadow:0 0 6px var(--green); animation:blip 1.4s ease-in-out infinite; }
  .pend   { background:var(--amber); box-shadow:0 0 6px var(--amber); animation:blip 2s ease-in-out infinite; }

  /* ── NODES ── */
  .node {
    position:absolute; z-index:4; width:182px;
    background:linear-gradient(180deg, rgba(18,24,38,.95), rgba(12,16,26,.95));
    border:1px solid var(--line-2); border-radius:12px; padding:8px 10px 10px;
    cursor:pointer;
    transition:transform .18s, border-color .18s, box-shadow .18s, opacity .2s;
    box-shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 8px 24px rgba(0,0,0,.35);
  }
  .node:hover { transform:translateY(-2px); }
  .node.faded { opacity:.14; filter:saturate(.3); pointer-events:none; }
  .node .head { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
  .node .ico {
    width:22px; height:22px; border-radius:6px; display:grid; place-items:center;
    font-size:12px; border:1px solid var(--line-2);
  }
  .node .tag { font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:.18em; color:var(--dim); text-transform:uppercase; }
  .node h4 { margin:0; font-size:11.5px; font-weight:600; letter-spacing:-.01em; line-height:1.25; }
  .node p  { margin:4px 0 0; font-size:9px; color:var(--muted); line-height:1.4; font-family:'JetBrains Mono',monospace; }
  .node .nfoot {
    margin-top:6px; display:flex; justify-content:space-between; align-items:center;
    font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--dim);
    border-top:1px dashed var(--line); padding-top:5px;
  }
  .node .npulse { width:5px; height:5px; border-radius:50%; display:inline-block; vertical-align:-1px; margin-right:3px; animation:blip 1.6s ease-in-out infinite; }

  /* desk accent tints */
  .d-football .node .ico  { color:var(--cyan);    background:rgba(0,229,255,.09);    border-color:rgba(0,229,255,.25); }
  .d-football .node:hover { border-color:rgba(0,229,255,.5);    box-shadow:0 0 0 1px rgba(0,229,255,.2),    0 12px 28px rgba(0,229,255,.1); }
  .d-meme     .node .ico  { color:var(--magenta); background:rgba(255,92,242,.09);   border-color:rgba(255,92,242,.25); }
  .d-meme     .node:hover { border-color:rgba(255,92,242,.5);   box-shadow:0 0 0 1px rgba(255,92,242,.2),   0 12px 28px rgba(255,92,242,.1); }
  .d-tennis   .node .ico  { color:var(--amber);   background:rgba(255,181,71,.09);   border-color:rgba(255,181,71,.25); }
  .d-tennis   .node:hover { border-color:rgba(255,181,71,.5);   box-shadow:0 0 0 1px rgba(255,181,71,.2),   0 12px 28px rgba(255,181,71,.1); }

  /* ── SVG EDGES ── */
  .edge { stroke:var(--line-2); stroke-width:1.4; fill:none; opacity:.6; }
  .hi-f  { stroke:var(--cyan);    stroke-width:2; fill:none; opacity:.9; filter:drop-shadow(0 0 5px rgba(0,229,255,.6)); }
  .hi-m  { stroke:var(--magenta); stroke-width:2; fill:none; opacity:.9; filter:drop-shadow(0 0 5px rgba(255,92,242,.6)); }
  .hi-t  { stroke:var(--amber);   stroke-width:2; fill:none; opacity:.9; filter:drop-shadow(0 0 5px rgba(255,181,71,.6)); }
  .flow-f { stroke:var(--cyan);    stroke-width:2; fill:none; stroke-dasharray:2 8; animation:dash 1.2s linear infinite; filter:drop-shadow(0 0 4px rgba(0,229,255,.7)); }
  .flow-m { stroke:var(--magenta); stroke-width:2; fill:none; stroke-dasharray:2 8; animation:dash 1.2s linear infinite; filter:drop-shadow(0 0 4px rgba(255,92,242,.7)); }
  .ca-f { stroke:var(--cyan);    stroke-width:2;   fill:none; stroke-dasharray:3 5; opacity:.85; filter:drop-shadow(0 0 6px rgba(0,229,255,.5)); animation:dash 1.6s linear infinite; }
  .ca-m { stroke:var(--magenta); stroke-width:2;   fill:none; stroke-dasharray:3 5; opacity:.85; filter:drop-shadow(0 0 6px rgba(255,92,242,.5)); animation:dash 1.6s linear infinite; }
  .ca-t { stroke:var(--amber);   stroke-width:1.5; fill:none; stroke-dasharray:7 7; opacity:.4; }
  @keyframes dash { to { stroke-dashoffset:-40; } }

  /* ── LANE LABELS ── */
  .lane-lbl {
    position:absolute; z-index:3; right:12px;
    font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:.16em;
    color:var(--dim); text-transform:uppercase; text-align:right; pointer-events:none;
    white-space:nowrap;
  }

  /* ── COMING SOON BADGE ── */
  .cs-badge {
    position:absolute; z-index:8;
    display:inline-flex; align-items:center; gap:5px;
    padding:4px 11px; border-radius:8px;
    background:rgba(255,181,71,.13); border:1px solid rgba(255,181,71,.45);
    font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:700;
    color:var(--amber); letter-spacing:.14em; white-space:nowrap;
    box-shadow:0 0 14px rgba(255,181,71,.2);
    animation:cs-glow 2.5s ease-in-out infinite;
  }
  @keyframes cs-glow { 50%{ box-shadow:0 0 22px rgba(255,181,71,.4); border-color:rgba(255,181,71,.7); } }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="brand-dot"></span>
    Agentic&nbsp;Markets <small>/ Unified Schema</small>
  </div>
  <div style="flex:1"></div>
  <span class="pill"><span class="dot"></span>&nbsp;3 desk · 2 live · 1 coming soon</span>
  <span class="pill" id="clock" style="font-family:'JetBrains Mono',monospace;">—</span>
</div>

<div class="canvas-wrap">
  <div class="canvas" id="canvas">
    <div class="grid-bg"></div>
    <svg class="edges" id="edges" preserveAspectRatio="none"></svg>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   LAYOUT CONSTANTS
═══════════════════════════════════════════════════════ */
const CW = 1440, CH = 1310;

// Column: nx = left-edge of 182px node, cx = center x, zx = zone left, zw = zone width
const COL = {
  football: { nx:149,  cx:240,  zx:20,   zw:440, rgba:'0,229,255',   color:'var(--cyan)',    cls:'f', status:'live'    },
  meme:     { nx:619,  cx:710,  zx:490,  zw:440, rgba:'255,92,242',  color:'var(--magenta)', cls:'m', status:'live'    },
  tennis:   { nx:1089, cx:1180, zx:960,  zw:440, rgba:'255,181,71',  color:'var(--amber)',   cls:'t', status:'pending' },
};

// Y positions for the 8 pipeline stages
const YS = [250, 375, 500, 625, 750, 875, 1000, 1125];

// Capital Allocator box
const CA_X = 560, CA_Y = 44, CA_W = 320;

/* ═══════════════════════════════════════════════════════
   DESK DATA
═══════════════════════════════════════════════════════ */
const DESKS = [
  {
    id:'football', label:'Football AI', ico:'⬡', alloc:'60%',
    nodes:[
      {ico:'🔷', tag:'SOURCES',  title:'Betfair + API Sources',    desc:'6 fonti · quote live + xG + fixture'},
      {ico:'🔄', tag:'AGENT',    title:'DataCollectorAgent',        desc:'Ciclo 10m · fuzzy match · Redis'},
      {ico:'📐', tag:'MODELS',   title:'Dixon-Coles · Pi · xG',     desc:'3 modelli + Conformal CI α=0.10'},
      {ico:'🧠', tag:'AGENT',    title:'ModelAgent',                 desc:'Ensemble + probabilità CI'},
      {ico:'📈', tag:'AGENT',    title:'AnalystAgent',               desc:'edge = p − 1/odds · soglia ≥ 2%'},
      {ico:'🎯', tag:'AGENT',    title:'StrategistAgent',            desc:'Conviction 0–10 · Claude Sonnet'},
      {ico:'🛡️', tag:'AGENT',   title:'RiskManagerAgent',           desc:'Kelly f=0.25 · max 3% bankroll'},
      {ico:'💸', tag:'AGENT',    title:'TraderAgent',                desc:'Paper → LIVE · Betfair REST'},
    ],
  },
  {
    id:'meme', label:'Meme Coin', ico:'🚀', alloc:'40%',
    nodes:[
      {ico:'🔷', tag:'SOURCES',  title:'DexScreener + Binance',     desc:'Solana · 30s scan · order flow'},
      {ico:'🔍', tag:'AGENT',    title:'Scout Agent',                desc:'30s full scan · 1s focused top 3'},
      {ico:'🚦', tag:'AGENT',    title:'Filter Agent',               desc:'$12K–$180K liq · age · cooldown'},
      {ico:'⚡', tag:'AGENT',    title:'Momentum Agent',             desc:'Score 0–100 · buy ratio · moonshot'},
      {ico:'🎯', tag:'AGENT',    title:'Entry Agent',                desc:'EV gate ≥ 4 · 5%/10% size'},
      {ico:'🛡️', tag:'AGENT',   title:'Risk Manager',               desc:'Max 3 posizioni · 10% cap'},
      {ico:'📤', tag:'AGENT',    title:'Exit Agent',                 desc:'Stop loss · partial profit · trail'},
      {ico:'📓', tag:'AGENT',    title:'Journal Agent',              desc:'Equity curve · Vercel Blob'},
    ],
  },
  {
    id:'tennis', label:'Tennis AI', ico:'🎾', alloc:'—',
    nodes:[
      {ico:'🎾', tag:'SOURCES',  title:'Betfair + Tennis APIs',     desc:'6 fonti · Elo + serve stats'},
      {ico:'🔄', tag:'AGENT',    title:'DataCollectorAgent',         desc:'Ciclo 5m · fuzzy match · Redis'},
      {ico:'📐', tag:'MODELS',   title:'Elo · Serve · Fatigue',      desc:'3 modelli + Conformal CI α=0.10'},
      {ico:'🧠', tag:'AGENT',    title:'ModelAgent',                  desc:'Ensemble + probabilità CI'},
      {ico:'📈', tag:'AGENT',    title:'AnalystAgent',                desc:'edge = p − 1/odds · soglia ≥ 2.5%'},
      {ico:'🎯', tag:'AGENT',    title:'StrategistAgent',             desc:'Conviction 0–10 · Claude Sonnet'},
      {ico:'🛡️', tag:'AGENT',   title:'RiskManagerAgent',            desc:'Kelly f=0.25 · max 3% bankroll'},
      {ico:'💸', tag:'AGENT',    title:'TraderAgent',                 desc:'Paper → LIVE · Betfair REST'},
    ],
  },
];

/* ═══════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════ */
const canvas = document.getElementById('canvas');
const svgEl  = document.getElementById('edges');
canvas.style.width  = CW + 'px';
canvas.style.height = CH + 'px';

function nodeCenter(uid) {
  const el = canvas.querySelector(`[data-uid="${uid}"]`);
  if (!el) return null;
  const r = el.getBoundingClientRect(), c = canvas.getBoundingClientRect();
  return { x: r.left-c.left + r.width/2, top: r.top-c.top, bot: r.top-c.top + r.height };
}
function caBottomCenter() {
  const el = canvas.querySelector('.capital-allocator');
  if (!el) return { x: CA_X + CA_W/2, y: CA_Y + 128 };
  const r = el.getBoundingClientRect(), c = canvas.getBoundingClientRect();
  return { x: r.left-c.left + r.width/2, y: r.top-c.top + r.height };
}
function mkPath(cls, d) {
  const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  p.setAttribute('class', cls); p.setAttribute('d', d); svgEl.appendChild(p);
}
function bez(x1, y1, x2, y2) {
  const dy = Math.abs(y2-y1) * 0.52;
  return `M ${x1} ${y1} C ${x1} ${y1+dy}, ${x2} ${y2-dy}, ${x2} ${y2}`;
}
function bezLateral(x1, y1, x2, y2) {
  const dx = Math.abs(x2-x1) * 0.4;
  const dy = Math.abs(y2-y1) * 0.35;
  return `M ${x1} ${y1} C ${x1+dx*(x2>x1?1:-1)} ${y1+dy}, ${x2} ${y2-dy}, ${x2} ${y2}`;
}

/* ═══════════════════════════════════════════════════════
   RENDER ZONES
═══════════════════════════════════════════════════════ */
function renderZones() {
  const zoneTop = 215, zoneH = 960;
  Object.entries(COL).forEach(([id, c]) => {
    const desk = DESKS.find(d => d.id === id);
    const isPend = c.status === 'pending';

    // Background zone
    const zone = document.createElement('div');
    zone.className = 'desk-zone';
    Object.assign(zone.style, {
      left: c.zx+'px', top: zoneTop+'px',
      width: c.zw+'px', height: zoneH+'px',
      borderColor: `rgba(${c.rgba}, ${isPend ? '.08' : '.13'})`,
      background: `rgba(${c.rgba}, ${isPend ? '.015' : '.025'})`,
      opacity: isPend ? '.7' : '1',
    });
    canvas.appendChild(zone);

    // Desk label
    const lbl = document.createElement('div');
    lbl.className = 'desk-label';
    Object.assign(lbl.style, { left:(c.zx+14)+'px', top:(zoneTop+8)+'px', color:c.color });
    lbl.innerHTML = `<span class="dl-ico" style="background:rgba(${c.rgba},.1);border-color:rgba(${c.rgba},.3)">${desk.ico}</span>${desk.label}`;
    canvas.appendChild(lbl);

    // Allocation badge
    const abadge = document.createElement('div');
    abadge.className = 'desk-alloc';
    Object.assign(abadge.style, {
      left: (c.zx + c.zw - 10) + 'px',
      top:  (zoneTop + 8) + 'px',
      transform: 'translateX(-100%)',
      color: c.color,
      background: `rgba(${c.rgba},.07)`,
      borderColor: `rgba(${c.rgba},.22)`,
    });
    abadge.textContent = desk.alloc === '—' ? '⏳ soon' : desk.alloc+' capital';
    canvas.appendChild(abadge);
  });
}

/* ═══════════════════════════════════════════════════════
   RENDER CAPITAL ALLOCATOR
═══════════════════════════════════════════════════════ */
function renderCapitalAllocator() {
  const el = document.createElement('div');
  el.className = 'capital-allocator';
  Object.assign(el.style, { left:CA_X+'px', top:CA_Y+'px', width:CA_W+'px' });
  el.innerHTML = `
    <div class="ca-head">
      <div class="ca-ico">💰</div>
      <div>
        <div class="ca-tag">AI Desk Manager</div>
        <div class="ca-title">Capital Allocator</div>
      </div>
    </div>
    <div class="ca-desc">Gestisce l'allocazione dinamica del capitale tra i desk operativi · in sviluppo</div>
    <div class="ca-allocs">
      <div class="ca-alloc football"><span class="ca-pulse live"></span>⬡ Football &middot; 60%</div>
      <div class="ca-alloc meme"><span class="ca-pulse live"></span>🚀 Meme Coin &middot; 40%</div>
      <div class="ca-alloc tennis"><span class="ca-pulse pend"></span>🎾 Tennis &middot; presto</div>
    </div>`;
  canvas.appendChild(el);
}

/* ═══════════════════════════════════════════════════════
   RENDER NODES
═══════════════════════════════════════════════════════ */
function renderNodes() {
  DESKS.forEach(desk => {
    const col = COL[desk.id];
    const isPend = col.status === 'pending';

    const wrap = document.createElement('div');
    wrap.className = `d-${desk.id}`;
    wrap.style.cssText = 'position:absolute;inset:0;pointer-events:none;';

    desk.nodes.forEach((n, i) => {
      const el = document.createElement('div');
      el.className = 'node';
      el.dataset.uid = `${desk.id}_${i}`;
      el.style.left = col.nx + 'px';
      el.style.top  = YS[i] + 'px';
      el.style.pointerEvents = 'all';
      el.innerHTML = `
        <div class="head">
          <div class="ico">${n.ico||'·'}</div>
          <div class="tag">${n.tag}</div>
        </div>
        <h4>${n.title}</h4>
        <p>${n.desc}</p>
        <div class="nfoot">
          <span>layer ${String(i+1).padStart(2,'0')}</span>
          <span style="color:var(--green)"><span class="npulse" style="background:var(--green);box-shadow:0 0 6px var(--green)"></span>live</span>
        </div>`;
      wrap.appendChild(el);
    });
    canvas.appendChild(wrap);
  });
}

/* ═══════════════════════════════════════════════════════
   RENDER EDGES
═══════════════════════════════════════════════════════ */
function renderEdges() {
  const cab = caBottomCenter();

  DESKS.forEach(desk => {
    const col  = COL[desk.id];
    const live = col.status === 'live';
    const ec   = live ? `hi-${col.cls}` : 'edge';
    const fc   = `flow-${col.cls}`;

    // Internal pipeline edges (node i → i+1)
    for (let i = 0; i < desk.nodes.length - 1; i++) {
      const a = nodeCenter(`${desk.id}_${i}`);
      const b = nodeCenter(`${desk.id}_${i+1}`);
      if (!a || !b) continue;
      mkPath('edge', bez(a.x, a.bot, b.x, b.top));
      if (live) mkPath(fc, bez(a.x, a.bot, b.x, b.top));
    }

    // Capital Allocator → desk top node
    const first = nodeCenter(`${desk.id}_0`);
    if (!first) return;

    if (desk.id === 'tennis') {
      // Coming soon: dashed, no flow animation
      mkPath('ca-t', bezLateral(cab.x, cab.y, first.x, first.top));
    } else {
      mkPath(`ca-${col.cls}`, bezLateral(cab.x, cab.y, first.x, first.top));
    }
  });
}

/* ═══════════════════════════════════════════════════════
   COMING SOON BADGE
═══════════════════════════════════════════════════════ */
function renderComingSoonBadge() {
  const cab   = caBottomCenter();
  const first = nodeCenter('tennis_0');
  if (!first) return;

  // Midpoint of the bezier arc
  const mx = (cab.x + first.x) / 2 + 20;
  const my = (cab.y + first.top) / 2 - 8;

  const badge = document.createElement('div');
  badge.className = 'cs-badge';
  badge.innerHTML = '⏳ &nbsp;COMING SOON';
  badge.style.left = (mx - 68) + 'px';
  badge.style.top  = (my - 11) + 'px';
  canvas.appendChild(badge);
}

/* ═══════════════════════════════════════════════════════
   LANE LABELS (right edge)
═══════════════════════════════════════════════════════ */
function renderLaneLabels() {
  const labels = [
    '01 · Data Sources',
    '02 · Collection',
    '03 · Models',
    '04 · Ensemble',
    '05 · Analysis',
    '06 · Strategy',
    '07 · Risk Mgmt',
    '08 · Execution',
  ];
  labels.forEach((lbl, i) => {
    const el = document.createElement('div');
    el.className = 'lane-lbl';
    el.style.top  = (YS[i] + 32) + 'px';
    el.style.right = '14px';
    el.textContent = lbl;
    canvas.appendChild(el);
  });
}

/* ═══════════════════════════════════════════════════════
   CLOCK
═══════════════════════════════════════════════════════ */
function tick() {
  document.getElementById('clock').textContent =
    new Date().toISOString().slice(11,19) + ' UTC';
}

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
(function init() {
  renderZones();
  renderCapitalAllocator();
  renderNodes();
  document.fonts.ready.then(() => {
    renderEdges();
    renderComingSoonBadge();
    renderLaneLabels();
  });
  tick(); setInterval(tick, 1000);
})();
</script>
