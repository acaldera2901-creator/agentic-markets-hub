<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Agentic Markets — Unified Schema</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#07090d; --bg-2:#0b0e14; --panel:#0e131c; --panel-2:#121826;
    --line:#1a2233; --line-2:#243049; --text:#e6edf7; --muted:#7d8aa3; --dim:#4a5774;
    --cyan:#00e5ff; --amber:#ffb547; --green:#32e0a0; --magenta:#ff5cf2; --violet:#9b8cff;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  body {
    min-height:100vh;
    background:
      radial-gradient(1200px 600px at 50% -8%, rgba(0,229,255,.05), transparent 60%),
      radial-gradient(900px 500px at 0% 110%, rgba(155,140,255,.04), transparent 60%),
      var(--bg);
  }
  body::before {
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
    background-size:56px 56px;
    mask-image:radial-gradient(ellipse at 50% 30%, black 40%, transparent 80%);
  }

  /* ── TOPBAR ── */
  .topbar {
    position:sticky; top:0; z-index:30; display:flex; align-items:center; gap:10px; padding:8px 16px;
    background:rgba(7,9,13,.88); backdrop-filter:blur(10px); border-bottom:1px solid var(--line);
  }
  .brand { display:flex; align-items:center; gap:8px; font-weight:700; font-size:13px; flex-shrink:0; }
  .brand-dot { width:9px; height:9px; border-radius:50%; background:var(--cyan); box-shadow:0 0 12px var(--cyan); }
  .brand small { color:var(--muted); font-weight:500; font-size:11px; margin-left:4px; }
  .pill {
    display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px;
    background:var(--panel-2); border:1px solid var(--line);
    font-size:10px; color:var(--muted); font-family:'JetBrains Mono',monospace; flex-shrink:0;
  }
  .pill .dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:blip 1.4s ease-in-out infinite; }
  @keyframes blip { 50%{opacity:.35;} }

  /* ── CANVAS ── */
  .canvas-wrap { position:relative; z-index:1; padding:16px 16px 40px; overflow:auto; }
  .canvas {
    position:relative; border:1px solid var(--line); border-radius:14px;
    background:linear-gradient(180deg, rgba(11,14,20,.9), rgba(8,10,16,.95));
  }
  .grid-bg {
    position:absolute; inset:0; pointer-events:none; border-radius:14px;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
    background-size:40px 40px;
  }
  svg.edges { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:2; overflow:visible; }

  /* ── DESK ZONE ── */
  .desk-zone { position:absolute; border-radius:10px; border:1px solid; pointer-events:none; z-index:1; }
  .desk-label {
    position:absolute; z-index:5; display:flex; align-items:center; gap:8px;
    font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; letter-spacing:.2em; text-transform:uppercase;
  }
  .dl-ico { width:24px; height:24px; border-radius:6px; display:grid; place-items:center; font-size:13px; border:1px solid; }
  .desk-alloc {
    position:absolute; z-index:5; font-family:'JetBrains Mono',monospace; font-size:8px; font-weight:700;
    padding:2px 8px; border-radius:6px; border:1px solid;
  }

  /* ── CAPITAL ALLOCATOR ── */
  .capital-allocator {
    position:absolute; z-index:7;
    background:linear-gradient(135deg, rgba(14,22,40,.98), rgba(9,14,26,.98));
    border:1px solid rgba(0,229,255,.35); border-radius:16px; padding:14px 20px 16px;
    box-shadow:0 0 0 1px rgba(0,229,255,.12), 0 0 50px rgba(0,229,255,.14), 0 20px 50px rgba(0,0,0,.6);
  }
  .ca-head { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
  .ca-ico {
    width:36px; height:36px; border-radius:10px; display:grid; place-items:center;
    font-size:20px; background:rgba(0,229,255,.1); border:1px solid rgba(0,229,255,.3); flex-shrink:0;
  }
  .ca-tag  { font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:.2em; color:rgba(0,229,255,.65); text-transform:uppercase; }
  .ca-title { font-size:15px; font-weight:700; letter-spacing:-.01em; }
  .ca-desc  { font-size:9px; color:var(--muted); font-family:'JetBrains Mono',monospace; line-height:1.5; margin-bottom:12px; }
  .ca-allocs { display:flex; gap:8px; flex-wrap:wrap; }
  .ca-alloc {
    display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:8px; border:1px solid;
    font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:700;
  }
  .ca-alloc.f { background:rgba(0,229,255,.08);  border-color:rgba(0,229,255,.28);  color:var(--cyan); }
  .ca-alloc.m { background:rgba(255,92,242,.08); border-color:rgba(255,92,242,.28); color:var(--magenta); }
  .ca-alloc.t { background:rgba(255,181,71,.08); border-color:rgba(255,181,71,.28); color:var(--amber); }
  .cad { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .cad.live { background:var(--green);  box-shadow:0 0 6px var(--green);  animation:blip 1.4s ease-in-out infinite; }
  .cad.pend { background:var(--amber);  box-shadow:0 0 6px var(--amber);  animation:blip 2s ease-in-out infinite; }

  /* ── NODES ── */
  .node {
    position:absolute; z-index:4; width:182px;
    background:linear-gradient(180deg, rgba(18,24,38,.95), rgba(12,16,26,.95));
    border:1px solid var(--line-2); border-radius:12px; padding:8px 10px 10px;
    cursor:pointer; transition:transform .18s, border-color .18s, box-shadow .18s;
    box-shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 8px 24px rgba(0,0,0,.35);
  }
  .node:hover { transform:translateY(-2px); }
  .node .head { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
  .node .ico  { width:22px; height:22px; border-radius:6px; display:grid; place-items:center; font-size:12px; border:1px solid var(--line-2); }
  .node .ntag { font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:.18em; color:var(--dim); text-transform:uppercase; }
  .node h4    { margin:0; font-size:11.5px; font-weight:600; letter-spacing:-.01em; line-height:1.25; }
  .node p     { margin:4px 0 0; font-size:9px; color:var(--muted); line-height:1.4; font-family:'JetBrains Mono',monospace; }
  .node .nft  {
    margin-top:6px; display:flex; justify-content:space-between; align-items:center;
    font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--dim);
    border-top:1px dashed var(--line); padding-top:5px;
  }
  .np { width:5px; height:5px; border-radius:50%; display:inline-block; vertical-align:-1px; margin-right:3px; animation:blip 1.6s ease-in-out infinite; }
  .np.g { background:var(--green); box-shadow:0 0 6px var(--green); }

  /* desk accent tints */
  .d-f .node .ico  { color:var(--cyan);    background:rgba(0,229,255,.09);   border-color:rgba(0,229,255,.25); }
  .d-f .node:hover { border-color:rgba(0,229,255,.5);   box-shadow:0 0 0 1px rgba(0,229,255,.2),0 12px 28px rgba(0,229,255,.1); }
  .d-m .node .ico  { color:var(--magenta); background:rgba(255,92,242,.09);  border-color:rgba(255,92,242,.25); }
  .d-m .node:hover { border-color:rgba(255,92,242,.5);  box-shadow:0 0 0 1px rgba(255,92,242,.2),0 12px 28px rgba(255,92,242,.1); }
  .d-t .node .ico  { color:var(--amber);   background:rgba(255,181,71,.09);  border-color:rgba(255,181,71,.25); }
  .d-t .node:hover { border-color:rgba(255,181,71,.5);  box-shadow:0 0 0 1px rgba(255,181,71,.2),0 12px 28px rgba(255,181,71,.1); }

  /* ── SVG EDGES ── */
  .edge  { stroke:var(--line-2);   stroke-width:1.4; fill:none; opacity:.6; }
  .hi-f  { stroke:var(--cyan);     stroke-width:2;   fill:none; opacity:.9; filter:drop-shadow(0 0 5px rgba(0,229,255,.55)); }
  .hi-m  { stroke:var(--magenta);  stroke-width:2;   fill:none; opacity:.9; filter:drop-shadow(0 0 5px rgba(255,92,242,.55)); }
  .hi-t  { stroke:var(--amber);    stroke-width:1.5; fill:none; opacity:.65; }
  .fl-f  { stroke:var(--cyan);     stroke-width:2;   fill:none; stroke-dasharray:2 8; animation:dash 1.2s linear infinite; filter:drop-shadow(0 0 4px rgba(0,229,255,.7)); }
  .fl-m  { stroke:var(--magenta);  stroke-width:2;   fill:none; stroke-dasharray:2 8; animation:dash 1.2s linear infinite; filter:drop-shadow(0 0 4px rgba(255,92,242,.7)); }
  .ca-f  { stroke:var(--cyan);     stroke-width:2;   fill:none; stroke-dasharray:3 6; animation:dash 1.8s linear infinite; opacity:.8; filter:drop-shadow(0 0 6px rgba(0,229,255,.5)); }
  .ca-m  { stroke:var(--magenta);  stroke-width:2;   fill:none; stroke-dasharray:3 6; animation:dash 1.8s linear infinite; opacity:.8; filter:drop-shadow(0 0 6px rgba(255,92,242,.5)); }
  .ca-t  { stroke:var(--amber);    stroke-width:1.5; fill:none; stroke-dasharray:8 8; opacity:.35; }
  @keyframes dash { to { stroke-dashoffset:-40; } }

  /* ── LANE LABELS ── */
  .lane-lbl {
    position:absolute; z-index:3; right:14px;
    font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:.16em;
    color:var(--dim); text-transform:uppercase; text-align:right; pointer-events:none; white-space:nowrap;
  }

  /* ── COMING SOON BADGE ── */
  .cs-badge {
    position:absolute; z-index:8; display:inline-flex; align-items:center; gap:5px;
    padding:4px 12px; border-radius:8px; background:rgba(255,181,71,.13);
    border:1px solid rgba(255,181,71,.45); font-family:'JetBrains Mono',monospace;
    font-size:9px; font-weight:700; color:var(--amber); letter-spacing:.14em; white-space:nowrap;
    box-shadow:0 0 14px rgba(255,181,71,.2); animation:csglow 2.5s ease-in-out infinite;
  }
  @keyframes csglow { 50%{ box-shadow:0 0 24px rgba(255,181,71,.45); border-color:rgba(255,181,71,.75); } }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="brand-dot"></span>
    Agentic&nbsp;Markets <small>/ Unified Schema</small>
  </div>
  <div style="flex:1"></div>
  <span class="pill"><span class="dot"></span>&nbsp;3 desk · 2 live · 1 coming soon</span>
  <span class="pill" id="clock" style="font-family:'JetBrains Mono',monospace;">—</span>
</div>

<div class="canvas-wrap">
  <div class="canvas" id="canvas">
    <div class="grid-bg"></div>
    <svg class="edges" id="svg" preserveAspectRatio="none"></svg>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   LAYOUT — all positions are STATIC / pre-computed
   → no getBoundingClientRect needed
═══════════════════════════════════════════════ */
const CW = 1440, CH = 1320;

// Column layout: cx = node horizontal center, nx = node left edge
const COL = {
  f: { id:'football', cx:240,  nx:149,  zx:20,  zw:440, rgba:'0,229,255',  color:'var(--cyan)',    label:'Football AI', ico:'⬡', alloc:'60% capital', live:true  },
  m: { id:'meme',     cx:710,  nx:619,  zx:490, zw:440, rgba:'255,92,242', color:'var(--magenta)', label:'Meme Coin',   ico:'🚀', alloc:'40% capital', live:true  },
  t: { id:'tennis',   cx:1180, nx:1089, zx:960, zw:440, rgba:'255,181,71', color:'var(--amber)',   label:'Tennis AI',   ico:'🎾', alloc:'⏳ soon',     live:false },
};

// Node vertical positions — top edge of each node
const NY = [240, 365, 490, 615, 740, 865, 990, 1115];
const NH  = 88;  // node height (px) — approx based on content

// Capital Allocator box
const CA_X=560, CA_Y=40, CA_W=320, CA_H=132;
const CA_CX = CA_X + CA_W/2; // = 720
const CA_BY = CA_Y + CA_H;   // = 172  (bottom y)

// Pipeline node data per desk
const DESKS = {
  f:[
    {ico:'🔷',tag:'SOURCES', h:'Betfair + API Sources',    d:'6 fonti · quote live + xG + fixture'},
    {ico:'🔄',tag:'AGENT',   h:'DataCollectorAgent',        d:'Ciclo 10m · fuzzy match · Redis'},
    {ico:'📐',tag:'MODELS',  h:'Dixon-Coles · Pi · xG',     d:'3 modelli + Conformal CI α=0.10'},
    {ico:'🧠',tag:'AGENT',   h:'ModelAgent',                 d:'Ensemble + probabilità CI'},
    {ico:'📈',tag:'AGENT',   h:'AnalystAgent',               d:'edge = p − 1/odds · soglia ≥ 2%'},
    {ico:'🎯',tag:'AGENT',   h:'StrategistAgent',            d:'Conviction 0–10 · Claude Sonnet'},
    {ico:'🛡️',tag:'AGENT',  h:'RiskManagerAgent',           d:'Kelly f=0.25 · max 3% bankroll'},
    {ico:'💸',tag:'AGENT',   h:'TraderAgent',                d:'Paper → LIVE · Betfair REST'},
  ],
  m:[
    {ico:'🔷',tag:'SOURCES', h:'DexScreener + Binance',     d:'Solana · 30s scan · order flow'},
    {ico:'🔍',tag:'AGENT',   h:'Scout Agent',                d:'30s full scan · 1s focused top 3'},
    {ico:'🚦',tag:'AGENT',   h:'Filter Agent',               d:'$12K–$180K liq · age · cooldown'},
    {ico:'⚡',tag:'AGENT',   h:'Momentum Agent',             d:'Score 0–100 · buy ratio · moonshot'},
    {ico:'🎯',tag:'AGENT',   h:'Entry Agent',                d:'EV gate ≥ 4 · 5%/10% size'},
    {ico:'🛡️',tag:'AGENT',  h:'Risk Manager',               d:'Max 3 posizioni · 10% cap'},
    {ico:'📤',tag:'AGENT',   h:'Exit Agent',                 d:'Stop loss · partial profit · trail'},
    {ico:'📓',tag:'AGENT',   h:'Journal Agent',              d:'Equity curve · Vercel Blob'},
  ],
  t:[
    {ico:'🎾',tag:'SOURCES', h:'Betfair + Tennis APIs',      d:'6 fonti · Elo + serve stats'},
    {ico:'🔄',tag:'AGENT',   h:'DataCollectorAgent',          d:'Ciclo 5m · fuzzy match · Redis'},
    {ico:'📐',tag:'MODELS',  h:'Elo · Serve · Fatigue',       d:'3 modelli + Conformal CI α=0.10'},
    {ico:'🧠',tag:'AGENT',   h:'ModelAgent',                   d:'Ensemble + probabilità CI'},
    {ico:'📈',tag:'AGENT',   h:'AnalystAgent',                 d:'edge = p − 1/odds · soglia ≥ 2.5%'},
    {ico:'🎯',tag:'AGENT',   h:'StrategistAgent',              d:'Conviction 0–10 · Claude Sonnet'},
    {ico:'🛡️',tag:'AGENT',  h:'RiskManagerAgent',             d:'Kelly f=0.25 · max 3% bankroll'},
    {ico:'💸',tag:'AGENT',   h:'TraderAgent',                  d:'Paper → LIVE · Betfair REST'},
  ],
};

const LANE_LABELS = [
  '01 · Data Sources',
  '02 · Collection',
  '03 · Models',
  '04 · Ensemble',
  '05 · Analysis',
  '06 · Strategy',
  '07 · Risk Mgmt',
  '08 · Execution',
];

/* ════════════════ HELPERS ════════════════ */
const canvas = document.getElementById('canvas');
const svg    = document.getElementById('svg');
canvas.style.width  = CW + 'px';
canvas.style.height = CH + 'px';

function el(tag, cls, style) {
  const e = document.createElement(tag);
  if (cls)   e.className = cls;
  if (style) Object.assign(e.style, style);
  return e;
}
function path(cls, d) {
  const p = document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('class',cls); p.setAttribute('d',d); svg.appendChild(p);
}
function bez(x1,y1,x2,y2) {                       // vertical bezier
  const dy = Math.abs(y2-y1)*0.52;
  return `M${x1} ${y1} C${x1} ${y1+dy},${x2} ${y2-dy},${x2} ${y2}`;
}
function bezLat(x1,y1,x2,y2) {                    // lateral bezier (CA → desk)
  const dx = Math.abs(x2-x1)*0.38;
  const dy = Math.abs(y2-y1)*0.32;
  const sx = x2>x1?1:-1;
  return `M${x1} ${y1} C${x1+dx*sx} ${y1+dy},${x2} ${y2-dy},${x2} ${y2}`;
}

/* ════════════════ RENDER ════════════════ */

// 1. Desk zone backgrounds + labels
function renderZones() {
  const zTop=218, zH=972;
  Object.entries(COL).forEach(([k,c])=>{
    // zone bg
    const z = el('div','desk-zone',{
      left:c.zx+'px', top:zTop+'px', width:c.zw+'px', height:zH+'px',
      borderColor:`rgba(${c.rgba},${c.live?.14:.08})`,
      background:`rgba(${c.rgba},${c.live?.028:.015})`,
    });
    canvas.appendChild(z);

    // desk label (top-left of zone)
    const lbl = el('div','desk-label',{left:(c.zx+14)+'px', top:(zTop+8)+'px', color:c.color});
    lbl.innerHTML=`<span class="dl-ico" style="background:rgba(${c.rgba},.1);border-color:rgba(${c.rgba},.3)">${c.ico}</span>${c.label}`;
    canvas.appendChild(lbl);

    // alloc badge (top-right of zone)
    const ab = el('div','desk-alloc',{
      left:(c.zx+c.zw-10)+'px', top:(zTop+8)+'px', transform:'translateX(-100%)',
      color:c.color, background:`rgba(${c.rgba},.07)`, borderColor:`rgba(${c.rgba},.22)`,
    });
    ab.textContent = c.alloc;
    canvas.appendChild(ab);
  });
}

// 2. Capital Allocator node
function renderCA() {
  const d = el('div','capital-allocator',{ left:CA_X+'px', top:CA_Y+'px', width:CA_W+'px' });
  d.innerHTML=`
    <div class="ca-head">
      <div class="ca-ico">💰</div>
      <div><div class="ca-tag">AI Desk Manager</div><div class="ca-title">Capital Allocator</div></div>
    </div>
    <div class="ca-desc">Gestisce l'allocazione dinamica del capitale tra i desk operativi · in sviluppo</div>
    <div class="ca-allocs">
      <div class="ca-alloc f"><span class="cad live"></span>⬡ Football &middot; 60%</div>
      <div class="ca-alloc m"><span class="cad live"></span>🚀 Meme Coin &middot; 40%</div>
      <div class="ca-alloc t"><span class="cad pend"></span>🎾 Tennis &middot; presto</div>
    </div>`;
  canvas.appendChild(d);
}

// 3. Pipeline nodes
function renderNodes() {
  Object.entries(COL).forEach(([k,c])=>{
    const wrap = el('div',`d-${k}`,{position:'absolute',inset:'0',pointerEvents:'none'});
    DESKS[k].forEach((n,i)=>{
      const nd = el('div','node',{left:c.nx+'px', top:NY[i]+'px', pointerEvents:'all'});
      nd.innerHTML=`
        <div class="head">
          <div class="ico">${n.ico}</div>
          <div class="ntag">${n.tag}</div>
        </div>
        <h4>${n.h}</h4>
        <p>${n.d}</p>
        <div class="nft">
          <span>layer ${String(i+1).padStart(2,'0')}</span>
          <span style="color:var(--green)"><span class="np g"></span>live</span>
        </div>`;
      wrap.appendChild(nd);
    });
    canvas.appendChild(wrap);
  });
}

// 4. SVG edges (all static coordinates — no getBoundingClientRect)
function renderEdges() {
  Object.entries(COL).forEach(([k,c])=>{
    const cx = c.cx;

    // Internal vertical edges (node bottom → next node top)
    for(let i=0;i<DESKS[k].length-1;i++){
      const ay = NY[i]+NH, by = NY[i+1];
      path('edge', bez(cx,ay,cx,by));
      if(c.live) path(`fl-${k}`, bez(cx,ay,cx,by));
    }

    // Capital Allocator → first node of this desk
    const fy = NY[0];
    if(k==='t'){
      path('ca-t', bezLat(CA_CX, CA_BY, cx, fy));
    } else {
      path(`ca-${k}`, bezLat(CA_CX, CA_BY, cx, fy));
    }
  });
}

// 5. "Coming Soon" badge on the Tennis line (at bezier midpoint)
function renderComingSoon() {
  // Midpoint of bezLat from (CA_CX, CA_BY) to (COL.t.cx, NY[0])
  const x1=CA_CX, y1=CA_BY, x2=COL.t.cx, y2=NY[0];
  const mx = (x1+x2)/2 + 24;
  const my = (y1+y2)/2 - 6;

  const b = el('div','cs-badge',{ left:(mx-72)+'px', top:(my-12)+'px' });
  b.innerHTML='⏳ &nbsp;COMING SOON';
  canvas.appendChild(b);
}

// 6. Lane labels (right edge)
function renderLaneLabels() {
  LANE_LABELS.forEach((lbl,i)=>{
    const e = el('div','lane-lbl',{ top:(NY[i]+NH/2-5)+'px', right:'14px' });
    e.textContent = lbl;
    canvas.appendChild(e);
  });
}

// 7. Clock
function tick(){ document.getElementById('clock').textContent = new Date().toISOString().slice(11,19)+' UTC'; }

/* ════════════════ INIT ════════════════ */
renderZones();
renderCA();
renderNodes();
renderEdges();      // static coords → runs synchronously, no timing issues
renderComingSoon();
renderLaneLabels();
tick(); setInterval(tick,1000);
</script>
</body>
</html>
