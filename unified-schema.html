<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agentic Markets — All Desks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090d;--bg2:#0b0e14;--panel:#0e131c;--panel2:#121826;
  --line:#1a2233;--line2:#243049;--text:#e6edf7;--muted:#7d8aa3;--dim:#4a5774;
  --cyan:#00e5ff;--amber:#ffb547;--green:#32e0a0;--magenta:#ff5cf2;
  --violet:#9b8cff;--red:#ff5d6c;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 16px;height:48px;
  background:rgba(7,9,13,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);z-index:50;}
.brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;flex-shrink:0;}
.brand-dot{width:9px;height:9px;border-radius:50%;background:var(--cyan);box-shadow:0 0 12px var(--cyan);}
.brand small{color:var(--muted);font-weight:500;font-size:11px;margin-left:4px;}
.grow{flex:1;}
.desk-jump{display:flex;gap:4px;}
.desk-jump button{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:6px;
  font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--line2);
  background:rgba(14,19,28,.8);color:var(--muted);font-family:'Inter',sans-serif;transition:all .15s;}
.desk-jump button:hover{color:var(--text);}
.desk-jump .jf{color:var(--cyan);border-color:rgba(0,229,255,.3);background:rgba(0,229,255,.06);}
.desk-jump .jm{color:var(--magenta);border-color:rgba(255,92,242,.3);background:rgba(255,92,242,.06);}
.desk-jump .jt{color:var(--amber);border-color:rgba(255,181,71,.3);background:rgba(255,181,71,.06);}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:999px;
  background:var(--panel2);border:1px solid var(--line);font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.pill .dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blip 1.4s ease-in-out infinite;}
@keyframes blip{50%{opacity:.35;}}

/* CANVAS WRAP */
.canvas-wrap{flex:1;overflow:auto;position:relative;cursor:grab;}
.canvas-wrap:active{cursor:grabbing;}
.canvas{position:relative;width:3760px;height:2320px;}
.canvas::before{content:"";position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:48px 48px;}
svg.edges{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;overflow:visible;}

/* CAPITAL ALLOCATOR NODE */
.ca-node{
  position:absolute;z-index:5;
  background:linear-gradient(135deg,rgba(14,19,28,.98),rgba(18,24,38,.95));
  border:1.5px solid rgba(0,229,255,.45);border-radius:14px;
  padding:14px 20px;
  box-shadow:0 0 32px rgba(0,229,255,.12),0 4px 20px rgba(0,0,0,.5);
  min-width:280px;
}
.ca-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.ca-ico{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;font-size:17px;
  background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.3);}
.ca-name{font-size:13px;font-weight:700;color:var(--text);}
.ca-tag{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--cyan);letter-spacing:.15em;
  background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.2);border-radius:4px;padding:2px 6px;margin-left:auto;}
.ca-allocs{display:flex;gap:8px;}
.ca-chip{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;
  font-size:10px;font-weight:600;border:1px solid var(--line);background:rgba(14,19,28,.6);}
.ca-chip .cdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;animation:blip 1.4s ease-in-out infinite;}
.ca-chip.f{color:var(--cyan);border-color:rgba(0,229,255,.3);background:rgba(0,229,255,.06);}
.ca-chip.f .cdot{background:var(--cyan);box-shadow:0 0 5px var(--cyan);}
.ca-chip.m{color:var(--magenta);border-color:rgba(255,92,242,.3);background:rgba(255,92,242,.06);}
.ca-chip.m .cdot{background:var(--magenta);box-shadow:0 0 5px var(--magenta);}
.ca-chip.t{color:var(--amber);border-color:rgba(255,181,71,.3);background:rgba(255,181,71,.06);opacity:.65;}
.ca-chip.t .cdot{background:var(--amber);}

/* DESK HEADER NODES */
.desk-node{
  position:absolute;z-index:5;border-radius:12px;padding:10px 16px;
  display:flex;align-items:center;gap:10px;min-width:200px;
  background:rgba(11,14,20,.95);border:1.5px solid;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.desk-node.f{border-color:rgba(0,229,255,.4);box-shadow:0 0 20px rgba(0,229,255,.08),0 4px 20px rgba(0,0,0,.4);}
.desk-node.m{border-color:rgba(255,92,242,.4);box-shadow:0 0 20px rgba(255,92,242,.08),0 4px 20px rgba(0,0,0,.4);}
.desk-node.t{border-color:rgba(255,181,71,.4);box-shadow:0 0 20px rgba(255,181,71,.08),0 4px 20px rgba(0,0,0,.4);opacity:.8;}
.desk-ico{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;font-size:14px;flex-shrink:0;}
.desk-node.f .desk-ico{background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.3);}
.desk-node.m .desk-ico{background:rgba(255,92,242,.1);border:1px solid rgba(255,92,242,.3);}
.desk-node.t .desk-ico{background:rgba(255,181,71,.1);border:1px solid rgba(255,181,71,.3);}
.desk-label{font-size:12px;font-weight:700;}
.desk-node.f .desk-label{color:var(--cyan);}
.desk-node.m .desk-label{color:var(--magenta);}
.desk-node.t .desk-label{color:var(--amber);}
.desk-alloc{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;border-radius:5px;}
.desk-node.f .desk-alloc{color:var(--cyan);background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.2);}
.desk-node.m .desk-alloc{color:var(--magenta);background:rgba(255,92,242,.06);border:1px solid rgba(255,92,242,.2);}
.desk-node.t .desk-alloc{color:var(--amber);background:rgba(255,181,71,.06);border:1px solid rgba(255,181,71,.2);}

/* COMING SOON BADGE */
.cs-overlay{
  position:absolute;z-index:8;
  border-radius:10px;
  background:rgba(7,9,13,.7);backdrop-filter:blur(4px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
}
.cs-badge{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.2em;
  color:var(--amber);border:1px solid rgba(255,181,71,.4);border-radius:8px;padding:8px 20px;
  background:rgba(255,181,71,.08);}

/* PIPELINE NODES */
.node{position:absolute;width:170px;border:1px solid var(--line2);border-radius:11px;
  background:var(--panel);padding:9px 11px;cursor:pointer;z-index:4;transition:all .15s ease;}
.node:hover{box-shadow:0 0 14px rgba(var(--acc-rgb,0,229,255),.18);}
.node.active{border-color:rgba(var(--acc-rgb,0,229,255),1);box-shadow:0 0 18px rgba(var(--acc-rgb,0,229,255),.25);}
.node.faded{opacity:.15;pointer-events:none;}
.col-f .node:hover,.col-f .node.active{border-color:var(--cyan);}
.col-m .node:hover,.col-m .node.active{border-color:var(--magenta);}
.col-t .node:hover,.col-t .node.active{border-color:var(--amber);}
.node .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.node .ico{font-size:15px;line-height:1;}
.node .tag{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--dim);letter-spacing:.12em;
  border:1px solid var(--line);border-radius:3px;padding:1px 4px;}
.node h4{margin:0 0 3px;font-size:10px;font-weight:700;color:var(--text);line-height:1.3;}
.node p{margin:0 0 6px;font-size:9px;color:var(--muted);line-height:1.4;}
.node .foot{display:flex;justify-content:space-between;align-items:center;
  font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--dim);}
.ok{color:var(--green);display:flex;align-items:center;gap:3px;}
.pnd{color:var(--amber);display:flex;align-items:center;gap:3px;}
.pulse{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:blip 1.4s ease-in-out infinite;}
.pulse.a{background:var(--amber);box-shadow:0 0 5px var(--amber);}

/* LANE LABELS */
.lane{position:absolute;font-family:'JetBrains Mono',monospace;font-size:8px;
  color:var(--dim);letter-spacing:.1em;z-index:3;white-space:nowrap;}
.lane b{font-weight:400;}
.lane-line{position:absolute;left:0;right:0;height:1px;background:var(--line);opacity:.5;z-index:1;}
.lane-col{width:1px;background:var(--line);opacity:.35;position:absolute;top:0;bottom:0;z-index:1;}

/* EDGE STYLES */
.edge-ca{stroke:rgba(0,229,255,.4);stroke-width:1.5;fill:none;stroke-dasharray:6 4;}
.edge-pipe-f{stroke:var(--line2);stroke-width:1.3;fill:none;opacity:.7;}
.edge-pipe-m{stroke:var(--line2);stroke-width:1.3;fill:none;opacity:.7;}
.edge-pipe-t{stroke:var(--line2);stroke-width:1.3;fill:none;opacity:.7;}
.edge-hot-f{stroke:var(--cyan);stroke-width:1.8;fill:none;stroke-dasharray:7 4;
  animation:dash 1.4s linear infinite;filter:drop-shadow(0 0 4px rgba(0,229,255,.5));}
.edge-hot-m{stroke:var(--magenta);stroke-width:1.8;fill:none;stroke-dasharray:7 4;
  animation:dash 1.4s linear infinite;filter:drop-shadow(0 0 4px rgba(255,92,242,.5));}
.edge-hot-t{stroke:var(--amber);stroke-width:1.5;fill:none;stroke-dasharray:7 4;opacity:.5;}
.edge-hi{stroke-width:2;opacity:1!important;}
.edge-dim{opacity:.1!important;}
@keyframes dash{to{stroke-dashoffset:-22;}}

/* LEAGUE CLUSTER */
.league-cluster-label{position:absolute;font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--dim);letter-spacing:.1em;z-index:4;}
.league-cluster{position:absolute;display:flex;flex-wrap:wrap;gap:5px;width:420px;z-index:4;}
.lchip{background:var(--panel);border:1px solid var(--line2);border-radius:7px;padding:5px 9px;cursor:pointer;transition:all .15s;min-width:110px;}
.lchip:hover,.lchip.active{border-color:var(--cyan);}
.lchip.today{border-color:var(--green);}
.ltitle{font-size:9px;font-weight:600;color:var(--text);display:flex;align-items:center;justify-content:space-between;}
.lcount{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);}
.lchip p{margin:1px 0 0;font-size:8px;color:var(--muted);}

/* SHARED DETAIL PANEL */
#panel{
  position:fixed;right:0;top:0;bottom:0;width:320px;z-index:100;
  background:var(--panel);border-left:1px solid var(--line);
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .2s ease;
  box-shadow:-6px 0 24px rgba(0,0,0,.5);
}
#panel.open{transform:translateX(0);}
.ph{padding:12px 14px;border-bottom:1px solid var(--line);}
.ph-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;}
.ph h2{margin:0 0 2px;font-size:14px;font-weight:700;}
.ph .sub{font-size:10px;color:var(--muted);}
.pclose{background:none;border:1px solid var(--line);color:var(--muted);
  width:20px;height:20px;border-radius:4px;cursor:pointer;font-size:11px;
  display:grid;place-items:center;transition:all .1s;}
.pclose:hover{color:var(--text);}
.pb{flex:1;padding:12px 14px;overflow-y:auto;font-size:12px;}
.pb h5{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:.18em;
  text-transform:uppercase;margin:12px 0 5px;padding-bottom:3px;border-bottom:1px solid var(--line);}
.pb h5:first-child{margin-top:0;}
.cb{font-family:'JetBrains Mono',monospace;font-size:9px;background:var(--bg2);border:1px solid var(--line);
  border-radius:7px;padding:9px 11px;line-height:1.7;color:var(--muted);white-space:pre;}
.kv{display:grid;grid-template-columns:1fr 1fr;gap:2px 8px;}
.kv span{font-size:9px;color:var(--muted);}
.kv b{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text);text-align:right;}
.nbrs{display:flex;flex-direction:column;gap:2px;}
.nbrs button{display:flex;justify-content:space-between;align-items:center;
  background:var(--panel2);border:1px solid var(--line);border-radius:6px;
  padding:5px 9px;font-size:9px;cursor:pointer;color:var(--text);
  font-family:'JetBrains Mono',monospace;transition:all .1s;}
.nbrs button:hover{border-color:var(--cyan);}
.nbrs .arr{color:var(--cyan);}
.pfooter{padding:7px 14px;border-top:1px solid var(--line);
  font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--dim);
  display:flex;justify-content:space-between;flex-shrink:0;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="brand-dot"></span>
    Agentic&nbsp;Markets <small>/ All Desks</small>
  </div>
  <div class="grow"></div>
  <div class="desk-jump">
    <button class="jf" onclick="jumpTo('football')">⬡ Football</button>
    <button class="jm" onclick="jumpTo('meme')">🚀 Meme Coin</button>
    <button class="jt" onclick="jumpTo('tennis')">🎾 Tennis</button>
  </div>
  <div class="pill"><span class="dot"></span><span id="clock">—</span></div>
</div>

<div class="canvas-wrap" id="wrap">
  <div class="canvas" id="canvas">
    <svg class="edges" id="svg"></svg>
  </div>
</div>

<div id="panel">
  <div class="ph">
    <div class="ph-top">
      <div class="eyebrow" id="p-ey" style="color:var(--cyan)">OVERVIEW</div>
      <button class="pclose" onclick="closePanel()">✕</button>
    </div>
    <h2 id="p-ti">—</h2>
    <div class="sub" id="p-su">—</div>
  </div>
  <div class="pb" id="p-bo"></div>
  <div class="pfooter"><span id="p-bu">—</span><span id="p-tm">—</span></div>
</div>

<script>

   LAYOUT CONSTANTS
───────────────────────────────────────────────────── */

const CA_H  = 110;  // CA node height
const DSK_Y = 240;  // Desk nodes top
const DSK_H = 52;   // Desk node height
const PIPE_Y = 390; // Pipeline nodes y offset (added to node.y)

// CA node position (centered over all 3 desks)
const CA_MID = (F_CX + T_CX) / 2;  // midpoint between football and tennis centers
const CA_W = 310;
const CA_LEFT = CA_MID - CA_W / 2;

/* ─────────────────────────────────────────────────────
   DATA — FOOTBALL
───────────────────────────────────────────────────── */
const DATA_FOOTBALL = {
  key:'football', colX:F_X, cx:F_CX, accent:'var(--cyan)', accentRgb:'0,229,255', cls:'f',
  buildTxt:'build #5.0.0 · 2026-05-06',

  overviewSub:'8 agenti · 6 leghe · 53 mercati Betfair · paper trading',
  nodes:[

const canvas  = document.getElementById('canvas');
const svgEl   = document.getElementById('svg');
const panelEl = document.getElementById('panel');
const DESKS   = {};
let lastDesk  = null;

function mkEl(tag, cls, styles={}) {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  Object.assign(el.style, styles);
  return el;
}
function path(d, cls) {
  const p = document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',d); p.setAttribute('class',cls);
  return p;
}
function bez(x1,y1,x2,y2) {
  const dy = Math.abs(y2-y1)*0.48;
  return `M${x1} ${y1} C${x1} ${y1+dy},${x2} ${y2-dy},${x2} ${y2}`;
}

/* Build Desk header node */
function buildDeskNode(D) {
  const w = 200, h = DSK_H;
  const x = D.cx - w/2;
  const el = mkEl('div','desk-node '+D.cls, {left:x+'px', top:DSK_Y+'px', width:w+'px'});
  el.innerHTML = `
    <div class="desk-ico">${D.cls==='f'?'⬡':D.cls==='m'?'🚀':'🎾'}</div>
    <div class="desk-label">${D.cls==='f'?'Football AI':D.cls==='m'?'Meme Coin':'Tennis AI'}</div>
    <div class="desk-alloc">${D.cls==='f'?'60%':D.cls==='m'?'40%':'soon'}</div>`;
  canvas.appendChild(el);
  el.dataset.deskKey = D.key;
  el.addEventListener('click', () => showOverview(D));
  // Store geometry for edge drawing
  D._deskEl = el;
  D._deskX = x; D._deskW = w;
}

/* Build pipeline nodes for one desk */
function buildPipeline(D) {
  const col = mkEl('div','col-'+D.cls);
  D.nodes.forEach(n => {
    const el = mkEl('div','node');
    el.style.left = (D.colX + n.x) + 'px';
    el.style.top  = (PIPE_Y + n.y) + 'px';
    el.dataset.id = D.key+'_'+n.id;
    el.dataset.desk = D.key;
    el.dataset.rawId = n.id;
    const ok = n.status === 'ok';
    el.innerHTML = `
      <div class="head"><div class="ico">${n.ico}</div><div class="tag">${n.tag}</div></div>
      <h4>${n.title}</h4>
      <p>${(n.desc||'').replace(/\n/g,'<br>')}</p>
      <div class="foot">
        <span>${n.id}</span>
        <span class="${ok?'ok':'pnd'}"><span class="pulse${ok?'':' a'}"></span>${ok?'live':'pending'}</span>
      </div>`;
    el.addEventListener('click', () => selectNode(D, n.id));
    el.addEventListener('mouseenter', () => { if (!D._activeId) hlNeighbors(D, n.id, true); });
    el.addEventListener('mouseleave', () => { if (!D._activeId) hlNeighbors(D, null, false); });
    canvas.appendChild(el);
  });

  // Lanes
  D.lanes.forEach(l => {
    const lab = mkEl('div','lane');
    lab.style.left = (D.colX + 6) + 'px';
    lab.style.top  = (PIPE_Y + l.y - 2) + 'px';
    lab.innerHTML  = `<b>›</b> ${l.label}`;
    canvas.appendChild(lab);
    const line = mkEl('div','lane-line');
    line.style.left  = D.colX + 'px';
    line.style.width = (D.key==='meme' ? 1060 : 1200) + 'px';
    line.style.top   = (PIPE_Y + l.y + 12) + 'px';
    canvas.appendChild(line);
  });

  // Column vertical separator
  const sep = mkEl('div','lane-col');
  sep.style.left = (D.colX - 1) + 'px';
  sep.style.top  = (PIPE_Y - 20) + 'px';
  sep.style.height = '1900px';
  canvas.appendChild(sep);

  // League cluster (football only)
  if (D.leagues) {
    const lbl = mkEl('div','league-cluster-label');
    lbl.style.left = (D.colX + 42) + 'px';
    lbl.style.top  = (PIPE_Y + 838) + 'px';
    lbl.textContent = '› Mercati Betfair Exchange attivi';
    canvas.appendChild(lbl);
    const cl = mkEl('div','league-cluster');
    cl.style.left = (D.colX + 42) + 'px';
    cl.style.top  = (PIPE_Y + 856) + 'px';
    D.leagues.forEach(l => {
      const c = mkEl('div','lchip'+(l.today?' today':''));
      c.dataset.lid = l.id;
      c.innerHTML = `<div class="ltitle">${l.title}<span class="lcount">×${l.count}</span></div><p>${l.desc}</p>`;
      c.addEventListener('click', () => selectLeague(D, l.id));
      cl.appendChild(c);
    });
    canvas.appendChild(cl);
  }

  // Coming soon overlay for tennis
  if (D.key === 'tennis') {
    const ov = mkEl('div','cs-overlay');
    ov.style.left   = (T_X - 10) + 'px';
    ov.style.top    = (PIPE_Y - 20) + 'px';
    ov.style.width  = '1240px';
    ov.style.height = '1680px';
    ov.innerHTML = `<div class="cs-badge">⏳ &nbsp;COMING SOON</div><div style="font-size:11px;color:var(--muted)">Desk Tennis in sviluppo · schema in anteprima</div>`;
    canvas.appendChild(ov);
  }
}

/* Draw SVG edges */
function buildEdges() {
  svgEl.innerHTML = '';

  function nodeCenter(D, id) {
    const el = canvas.querySelector(`[data-id="${D.key}_${id}"]`);
    if (!el) return null;
    const r = el.getBoundingClientRect();
    const c = canvas.getBoundingClientRect();
    return {
      x:  r.left - c.left + r.width/2,
      top: r.top  - c.top,
      bot: r.top  - c.top + r.height,
      cx: r.left  - c.left + r.width/2,
    };
  }

  // CA → Desk nodes
  const caEl  = canvas.querySelector('.ca-node');
  const caR   = caEl.getBoundingClientRect();
  const canvR = canvas.getBoundingClientRect();
  const caBot = caR.bottom - canvR.top;
  const caCX  = caR.left - canvR.left + caR.width/2;

  [DATA_FOOTBALL, DATA_MEME, DATA_TENNIS].forEach(D => {
    const dEl = D._deskEl;
    const dr  = dEl.getBoundingClientRect();
    const dTop = dr.top - canvR.top;
    const dCX  = dr.left - canvR.left + dr.width/2;
    const isTennis = D.key === 'tennis';
    const p = path(bez(caCX, caBot, dCX, dTop), 'edge-ca');
    if (isTennis) { p.style.opacity='.35'; p.style.strokeDasharray='5 6'; }
    svgEl.appendChild(p);
    D._ca_path = p;
  });

  // Desk → first source layer top-center
  [DATA_FOOTBALL, DATA_MEME, DATA_TENNIS].forEach(D => {
    const dEl = D._deskEl;
    const dr  = dEl.getBoundingClientRect();
    const dBot = dr.bottom - canvR.top;
    const dCX  = dr.left - canvR.left + dr.width/2;
    // target: midpoint of source row
    const srcY = PIPE_Y + 70; // source nodes top y
    const srcCX = D.colX + (D.key==='meme' ? 530 : 600);
    const p = path(`M${dCX} ${dBot} C${dCX} ${dBot+60},${srcCX} ${srcY-60},${srcCX} ${srcY}`, 'edge-ca');
    p.style.strokeOpacity = '.25';
    p.style.strokeDasharray = '4 5';
    svgEl.appendChild(p);
  });

  // Pipeline edges per desk
  [DATA_FOOTBALL, DATA_MEME, DATA_TENNIS].forEach(D => {
    const baseCls = 'edge-pipe-'+D.cls;
    const hotCls  = 'edge-hot-'+D.cls;
    const hotSet  = new Set(D.hot.map(([a,b]) => a+'→'+b));

    D.edges.forEach(([a,b]) => {
      const A = nodeCenter(D,a), B = nodeCenter(D,b);
      if (!A||!B) return;
      const isHot = hotSet.has(a+'→'+b);
      const p = path(bez(A.cx, A.bot, B.cx, B.top), isHot ? hotCls : baseCls);
      p.dataset.from = D.key+'_'+a;
      p.dataset.to   = D.key+'_'+b;
      svgEl.appendChild(p);
    });
  });
}

/* Highlight neighbors */
function hlNeighbors(D, id, on) {
  if (!on || !id) {
    svgEl.querySelectorAll('path[data-from]').forEach(p => p.classList.remove('edge-hi','edge-dim'));
    canvas.querySelectorAll('.node[data-desk="'+D.key+'"]').forEach(n => n.classList.remove('faded'));
    return;
  }
  const fid = D.key+'_'+id;
  const ups = new Set(), downs = new Set();
  D.edges.forEach(([a,b]) => { if(b===id) ups.add(D.key+'_'+a); if(a===id) downs.add(D.key+'_'+b); });
  svgEl.querySelectorAll('path[data-from]').forEach(p => {
    const mine = p.dataset.from===fid || p.dataset.to===fid;
    p.classList.toggle('edge-hi', mine);
    p.classList.toggle('edge-dim', !mine);
  });
  canvas.querySelectorAll('.node[data-desk="'+D.key+'"]').forEach(n => {
    const keep = n.dataset.id===fid || ups.has(n.dataset.id) || downs.has(n.dataset.id);
    n.classList.toggle('faded', !keep);
  });
}

/* Panel helpers */
function openPanel(eyebrow, title, sub, body, build, color) {
  document.getElementById('p-ey').textContent  = eyebrow;
  document.getElementById('p-ey').style.color  = color || 'var(--cyan)';
  document.getElementById('p-ti').textContent  = title;
  document.getElementById('p-su').textContent  = sub;
  document.getElementById('p-bo').innerHTML    = body;
  document.getElementById('p-bu').textContent  = build || '—';
  panelEl.classList.add('open');
}
function closePanel() { panelEl.classList.remove('open'); }
window.closePanel = closePanel;

/* Overview panel */
function showOverview(D) {
  if (!D) {
    openPanel('CAPITAL ALLOCATOR','Capital Allocator Agent',
      'Distribuzione capitale tra desk attivi',
      `<h5>Allocazione attuale</h5><div class="kv"><span>Football AI</span><b style="color:var(--cyan)">60%</b><span>Meme Coin</span><b style="color:var(--magenta)">40%</b><span>Tennis AI</span><b style="color:var(--amber)">coming soon</b></div><h5>Logica</h5><p style="font-size:11px;color:var(--muted);line-height:1.5">Gestione del capitale globale tra i desk attivi. Ottimizzazione risk-adjusted.</p>`,
      '—', 'var(--cyan)');
    return;
  }
  openPanel(D.overviewTitle.toUpperCase(), D.overviewTitle, D.overviewSub, D.overviewHTML, D.buildTxt, D.accent);
}

/* Select node */
function selectNode(D, id) {
  D._activeId = id;
  canvas.querySelectorAll('.node[data-desk="'+D.key+'"]').forEach(n =>
    n.classList.toggle('active', n.dataset.rawId===id));
  canvas.querySelectorAll('.node:not([data-desk="'+D.key+'"])').forEach(n =>
    n.classList.remove('active'));
  hlNeighbors(D, id, true);
  const n = D.nodes.find(x=>x.id===id); if (!n) return;
  const ups   = D.edges.filter(([a,b])=>b===id).map(([a])=>D.nodes.find(x=>x.id===a)).filter(Boolean);
  const downs = D.edges.filter(([a,b])=>a===id).map(([,b])=>D.nodes.find(x=>x.id===b)).filter(Boolean);
  const sch = Object.entries(n.schema||{}).map(([k,v])=>`<span>${k}</span><b>${v}</b>`).join('');
  const met = Object.entries(n.metrics||{}).map(([k,v])=>`<span>${k}</span><b>${v}</b>`).join('');
  openPanel(`LAYER · ${n.layer.toUpperCase()}`, n.title, `${n.id} · ${(n.tag||'').toLowerCase()}`,
    `<h5>Description</h5><p style="margin:0;font-size:11px;color:var(--text);line-height:1.5">${(n.desc||'').replace(/\n/g,' ')}</p>
     <h5>Schema / params</h5><div class="kv">${sch||'<span>—</span><b>—</b>'}</div>
     <h5>Live metrics</h5><div class="kv">${met||'<span>—</span><b>—</b>'}</div>
     <h5>Upstream (${ups.length})</h5>
     <div class="nbrs">${ups.length ? ups.map(u=>`<button onclick="selNodeByKey('${D.key}','${u.id}')"><span>${u.id} · ${u.title}</span><span class="arr">↑</span></button>`).join('') : '<div class="kv"><span>none</span><b>root</b></div>'}</div>
     <h5>Downstream (${downs.length})</h5>
     <div class="nbrs">${downs.length ? downs.map(d=>`<button onclick="selNodeByKey('${D.key}','${d.id}')"><span>${d.id} · ${d.title}</span><span class="arr">↓</span></button>`).join('') : '<div class="kv"><span>none</span><b>leaf</b></div>'}</div>`,
    D.buildTxt, D.accent);
}
window.selNodeByKey = (key, id) => { const D=DESKS[key]; if(D){D._activeId=null; selectNode(D,id);} };

/* Select league */
function selectLeague(D, lid) {
  const l = D.leagues.find(x=>x.id===lid); if (!l) return;
  canvas.querySelectorAll('.lchip').forEach(c=>c.classList.toggle('active',c.dataset.lid===lid));
  openPanel('BETFAIR EXCHANGE', l.title, `${l.count} mercati MATCH_ODDS attivi`,
    `<h5>Mercati ${l.title}</h5><div class="kv"><span>live</span><b>${l.count}</b><span>tipo</span><b>MATCH_ODDS</b><span>fonte</span><b>Betfair</b><span>status</span><b style="color:var(--green)">● live</b></div>
     <h5>Quote (esempio)</h5><div class="cb">${l.today ? 'Bayern Munich  1.65\nThe Draw       5.60\nParis St-G     4.50\n\nmargin: 4.2%' : `${l.count} mercati attivi\nfonte: Betfair Exchange`}</div>`,
    D.buildTxt, D.accent);
}

/* Jump to desk */
function jumpTo(key) {
  const D = DESKS[key];
  if (!D) return;
  const wrap = document.getElementById('wrap');
  const targetX = D.colX - 40;
  const targetY = PIPE_Y - 60;
  wrap.scrollTo({ left: targetX, top: targetY, behavior: 'smooth' });
}
window.jumpTo = jumpTo;

/* Scroll to center CA on load */
function centerCA() {
  const wrap = document.getElementById('wrap');
  const vpW = wrap.clientWidth, vpH = wrap.clientHeight;
  const scrollX = Math.max(0, CA_LEFT - vpW/2 + CA_W/2);
  const scrollY = 0;
  wrap.scrollTo({ left: scrollX, top: scrollY });
}

/* Clock */
function tick(){ document.getElementById('clock').textContent = new Date().toISOString().slice(11,19)+' UTC'; }

/* ─── INIT ─── */
buildCA();
[DATA_FOOTBALL, DATA_MEME, DATA_TENNIS].forEach(D => {
  D._activeId = null;
  buildDeskNode(D);
  buildPipeline(D);
  DESKS[D.key] = D;
});

document.fonts.ready.then(() => {
  requestAnimationFrame(() => {
    buildEdges();
    centerCA();
  });
});

tick(); setInterval(tick, 1000);

/* Pan support */
(function() {
  const wrap = document.getElementById('wrap');
  let dragging=false, sx=0, sy=0, sl=0, st=0;
  wrap.addEventListener('mousedown', e => {
    if (e.target.closest('.node,.ca-node,.desk-node,.lchip,button,#panel')) return;
    dragging=true; sx=e.clientX; sy=e.clientY; sl=wrap.scrollLeft; st=wrap.scrollTop;
    wrap.style.cursor='grabbing';
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    wrap.scrollLeft = sl - (e.clientX - sx);
    wrap.scrollTop  = st - (e.clientY - sy);
  });
  window.addEventListener('mouseup', () => { dragging=false; wrap.style.cursor='grab'; });
})();
</script>
